<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trust Scoring System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
        }
        
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        
        .tagline {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #34495e;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background-color: #3498db;
        }
        
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ecf0f1;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            border: 8px solid #bdc3c7;
            transition: all 0.5s ease;
        }
        
        .genuine {
            border-color: #27ae60;
            color: #27ae60;
            background: #eaabfb;
        }
        
        .fake {
            border-color: #e74c3c;
            color: #e74c3c;
            background: #fadbd8;
        }
        
        .flag {
            margin-top: 15px;
            padding: 10px;
            background: #f39c12;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }
        
        .normal-flag {
            margin-top: 15px;
            padding: 10px;
            background: #2ecc71;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🛡️ AI Trust Scoring System</h1>
        <p class="tagline">Multi-Source Fake Review Detection with Behavioral Analytics</p>

        <div class="form-group">
            <label for="userId">Target User ID (For Behavioral Check)</label>
            <input type="text" id="userId" placeholder="Enter a User ID (e.g., U12345)">
        </div>

        <div class="form-group">
            <label for="reviewText">Review Text to Analyze</label>
            <textarea id="reviewText" rows="5" placeholder="Paste the review text here..."></textarea>
        </div>

        <button onclick="analyzeReview()">Analyze Review & Get Score</button>

        <div id="results" class="result-box">
            <h2 id="classificationText">Analyzing...</h2>
            <div id="scoreCircle" class="score-circle">--%</div>
            <p><strong>Behavioral Status:</strong> <span id="behaviorFlag">Scanning...</span></p>
        </div>
    </div>

    <script>
        async function analyzeReview() {
            const userId = document.getElementById('userId').value || "unknown";
            const reviewText = document.getElementById('reviewText').value;
            const resultBox = document.getElementById('results');

            if (!reviewText) {
                alert("Please enter a review to analyze!");
                return;
            }

            // Show loading state
            resultBox.style.display = "block";
            document.getElementById('classificationText').innerText = "Analyzing text and behavior...";
            document.getElementById('scoreCircle').innerText = "⏳";
            document.getElementById('scoreCircle').className = "score-circle";

            try {
                const response = await fetch('/analyze_review', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        review_text: reviewText
                    })
                });

                const data = await response.json();

                // Update UI with AI Results
                document.getElementById('classificationText').innerText = "Classification: " + data.classification;
                const scoreCircle = document.getElementById('scoreCircle');
                scoreCircle.innerText = data.trust_score + "%";

                // Apply colors
                if (data.classification === "Genuine") {
                    scoreCircle.classList.add("genuine");
                } else {
                    scoreCircle.classList.add("fake");
                }

                // Update Behavioral Flag
                const flagSpan = document.getElementById('behaviorFlag');
                flagSpan.innerText = data.behavioral_flag;
                if (data.behavioral_flag !== "Normal") {
                    flagSpan.className = "flag";
                } else {
                    flagSpan.className = "normal-flag";
                }

            } catch (error) {
                console.error("Error:", error);
                alert("Error connecting to the backend server.");
            }
        }
    </script>

</body>

</html>
